<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>GasSync | Smart Fuel Tracking & Bill Intelligence</title>
    <meta name="title" content="GasSync | Smart Fuel Tracking & Bill Intelligence" />
    <meta name="description" content="Find the cheapest gas prices, track your fuel expenses, and navigate effortlessly with GasSync. Your all-in-one smart fuel companion." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thegassync.com/" />
    <meta property="og:title" content="GasSync | Smart Fuel Tracking & Bill Intelligence" />
    <meta property="og:description" content="Find the cheapest gas prices, track your fuel expenses, and navigate effortlessly with GasSync. Your all-in-one smart fuel companion." />
    <meta property="og:image" content="https://thegassync.com/gassync_logo.png" />
    <meta property="og:site_name" content="GasSync" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thegassync.com/" />
    <meta property="twitter:title" content="GasSync | Smart Fuel Tracking & Bill Intelligence" />
    <meta property="twitter:description" content="Find the cheapest gas prices, track your fuel expenses, and navigate effortlessly with GasSync. Your all-in-one smart fuel companion." />
    <meta property="twitter:image" content="https://thegassync.com/gassync_logo.png" />

    <!-- Font Preconnect -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Manrope (body) + Space Grotesk (headings — Neue Machina alternative) -->
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Space+Grotesk:wght@300..700&display=swap" />
    <script>
      // No-flash theme init
      (function () {
        try {
          var stored = localStorage.getItem('theme-storage');
          var isDark = stored
            ? !!JSON.parse(stored).state.isDark
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          var root = document.documentElement;
          root.classList.toggle('dark', isDark);
          root.style.colorScheme = isDark ? 'dark' : 'light';
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
